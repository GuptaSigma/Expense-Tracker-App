{% extends "base.html" %}

{% block title %}Verify OTP - ExpenseTracker{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full">
        <div class="glass-card rounded-3xl p-8 md:p-12">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-block bg-gradient-to-r from-green-100 to-emerald-100 p-4 rounded-2xl mb-4">
                    <i class="bi bi-shield-check text-5xl text-green-600"></i>
                </div>
                <h2 class="text-3xl md:text-4xl font-bold text-slate-900 mb-2">Verify Email</h2>
                <p class="text-slate-700 text-lg">Enter the OTP sent to your email</p>
            </div>
            
            <!-- OTP Verification Form -->
            <form method="POST" action="{{ url_for('auth.verify_otp') }}" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div>
                    <label class="block text-slate-700 font-semibold mb-2">Enter OTP</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="bi bi-shield-lock text-slate-700 text-lg"></i>
                        </div>
                        <input type="text" name="otp" 
                               class="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-xl text-slate-900 placeholder-gray-500 focus:border-green-500 focus:ring-2 focus:ring-green-500/50 transition-all outline-none text-center text-2xl tracking-widest" 
                               placeholder="000000"
                               pattern="[0-9]{6}"
                               maxlength="6"
                               required
                               autofocus>
                    </div>
                    <p class="text-slate-600 text-sm mt-2">6-digit code from your email</p>
                </div>
                
                <button type="submit" 
                        class="w-full py-4 bg-gradient-to-r from-green-500 to-emerald-500 rounded-xl text-white font-bold text-lg shadow-lg hover:shadow-green-500/50 transform hover:scale-[1.02] transition-all duration-300">
                    <i class="bi bi-check-lg mr-2"></i>Verify OTP
                </button>
            </form>
            
            <!-- Resend OTP -->
            <div class="mt-6 pt-6 border-t border-slate-200">
                <p class="text-center text-slate-700 mb-4">Didn't receive the OTP?</p>
                <form method="POST" action="{{ url_for('auth.resend_otp') }}" class="flex gap-2">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="hidden" name="email" value="{{ session.get('pending_verification_email', '') }}">
                    <button type="submit" 
                            class="w-full px-6 py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition-all">
                        <i class="bi bi-arrow-clockwise mr-2"></i>Resend OTP
                    </button>
                </form>
            </div>
            
            <!-- Back to Login -->
            <div class="text-center mt-6">
                <a href="{{ url_for('auth.login') }}" class="text-slate-700 hover:text-blue-600 transition-colors">
                    <i class="bi bi-arrow-left mr-2"></i>Back to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
