{% extends "base.html" %}

{% block title %}Add Income{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="glass-card">
            <div class="text-center mb-4">
                <i class="bi bi-cash-stack" style="font-size: 4rem; color: var(--primary-color);"></i>
                <h2 class="mt-3">Add Income</h2>
                <p class="text-muted">Track your earnings</p>
            </div>
            
            <form method="POST" action="{{ url_for('main.add_income') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-4">
                    <label class="form-label">Amount (₹)</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-currency-rupee"></i></span>
                        <input type="number" step="0.01" name="amount" class="form-control form-control-lg" 
                               placeholder="Enter amount" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Source</label>
                    <select name="source" class="form-select form-select-lg" required>
                        <option value="">Select source</option>
                        <option value="Salary">💼 Salary</option>
                        <option value="Freelance">💻 Freelance</option>
                        <option value="Business">🏢 Business</option>
                        <option value="Investment">📈 Investment</option>
                        <option value="Gift">🎁 Gift</option>
                        <option value="Other">📦 Other</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 btn-lg">
                    <i class="bi bi-check-circle me-2"></i>Add Income
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
