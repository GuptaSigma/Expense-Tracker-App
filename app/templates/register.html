{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full">
        <div class="glass-card rounded-3xl p-8 md:p-12">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-block bg-gradient-to-r from-accent-purple to-accent-pink p-4 rounded-2xl mb-4 glow-effect">
                    <i class="bi bi-person-plus text-5xl text-slate-900"></i>
                </div>
                <h2 class="text-3xl md:text-4xl font-bold text-slate-900 mb-2">Create Account</h2>
                <p class="text-slate-700 text-lg">Join us to track your expenses smartly</p>
            </div>
            
            <!-- Register Form -->
            <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div>
                    <label class="block text-slate-700 font-semibold mb-2">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="bi bi-person text-slate-700 text-lg"></i>
                        </div>
                        <input type="text" name="username" 
                               class="w-full pl-12 pr-4 py-4 bg-white border border-dark-border rounded-xl text-slate-900 placeholder-gray-500 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/50 transition-all outline-none" 
                               placeholder="Choose a username"
                               required autofocus>
                    </div>
                </div>
                
                <div>
                    <label class="block text-slate-700 font-semibold mb-2">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="bi bi-envelope text-slate-700 text-lg"></i>
                        </div>
                        <input type="email" name="email" 
                               class="w-full pl-12 pr-4 py-4 bg-white border border-dark-border rounded-xl text-slate-900 placeholder-gray-500 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/50 transition-all outline-none" 
                               placeholder="your.email@example.com"
                               required>
                    </div>
                </div>
                
                <div>
                    <label class="block text-slate-700 font-semibold mb-2">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="bi bi-lock text-slate-700 text-lg"></i>
                        </div>
                        <input type="password" name="password" 
                               class="w-full pl-12 pr-4 py-4 bg-white border border-dark-border rounded-xl text-slate-900 placeholder-gray-500 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/50 transition-all outline-none" 
                               placeholder="Create a strong password"
                               required>
                    </div>
                    <p class="text-slate-600 text-sm mt-2">Minimum 6 characters</p>
                </div>
                
                <button type="submit" 
                        class="w-full py-4 bg-gradient-to-r from-accent-purple to-accent-pink rounded-xl text-slate-900 font-bold text-lg shadow-lg hover:shadow-purple-500/50 transform hover:scale-[1.02] transition-all duration-300">
                    <i class="bi bi-person-plus mr-2"></i>Create Account
                </button>
                
                <div class="relative flex items-center my-6">
                    <div class="flex-grow border-t border-slate-200"></div>
                    <span class="px-4 text-slate-600 text-sm font-medium">Or sign up with</span>
                    <div class="flex-grow border-t border-slate-200"></div>
                </div>
                
                <a href="{{ url_for('auth.google_login') }}" 
                   class="w-full py-3 bg-white border-2 border-slate-200 rounded-xl text-slate-900 font-semibold text-center hover:bg-slate-50 hover:border-blue-400 transition-all duration-300 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Sign up with Google
                </a>
                
                <div class="text-center pt-4">
                    <p class="text-slate-700">
                        Already have an account? 
                        <a href="{{ url_for('auth.login') }}" class="text-primary-500 hover:text-primary-400 font-semibold transition-colors">
                            Login here
                        </a>
                    </p>
                </div>
            </form>
        </div>
        
        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="{{ url_for('main.index') }}" class="text-slate-700 hover:text-primary-500 transition-colors">
                <i class="bi bi-arrow-left mr-2"></i>Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
