{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full">
        <div class="glass-card rounded-3xl p-8 md:p-12">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-block bg-gradient-to-r from-accent-purple to-accent-pink p-4 rounded-2xl mb-4 glow-effect">
                    <i class="bi bi-person-plus text-5xl text-white"></i>
                </div>
                <h2 class="text-3xl md:text-4xl font-bold text-white mb-2">Create Account</h2>
                <p class="text-gray-400 text-lg">Join us to track your expenses smartly</p>
            </div>
            
            <!-- Register Form -->
            <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div>
                    <label class="block text-gray-300 font-semibold mb-2">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="bi bi-person text-gray-400 text-lg"></i>
                        </div>
                        <input type="text" name="username" 
                               class="w-full pl-12 pr-4 py-4 bg-dark-hover border border-dark-border rounded-xl text-white placeholder-gray-500 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/50 transition-all outline-none" 
                               placeholder="Choose a username"
                               required autofocus>
                    </div>
                </div>
                
                <div>
                    <label class="block text-gray-300 font-semibold mb-2">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="bi bi-envelope text-gray-400 text-lg"></i>
                        </div>
                        <input type="email" name="email" 
                               class="w-full pl-12 pr-4 py-4 bg-dark-hover border border-dark-border rounded-xl text-white placeholder-gray-500 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/50 transition-all outline-none" 
                               placeholder="your.email@example.com"
                               required>
                    </div>
                </div>
                
                <div>
                    <label class="block text-gray-300 font-semibold mb-2">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="bi bi-lock text-gray-400 text-lg"></i>
                        </div>
                        <input type="password" name="password" 
                               class="w-full pl-12 pr-4 py-4 bg-dark-hover border border-dark-border rounded-xl text-white placeholder-gray-500 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/50 transition-all outline-none" 
                               placeholder="Create a strong password"
                               required>
                    </div>
                    <p class="text-gray-500 text-sm mt-2">Minimum 6 characters</p>
                </div>
                
                <button type="submit" 
                        class="w-full py-4 bg-gradient-to-r from-accent-purple to-accent-pink rounded-xl text-white font-bold text-lg shadow-lg hover:shadow-purple-500/50 transform hover:scale-[1.02] transition-all duration-300">
                    <i class="bi bi-person-plus mr-2"></i>Create Account
                </button>
                
                <div class="text-center pt-4">
                    <p class="text-gray-400">
                        Already have an account? 
                        <a href="{{ url_for('auth.login') }}" class="text-primary-500 hover:text-primary-400 font-semibold transition-colors">
                            Login here
                        </a>
                    </p>
                </div>
            </form>
        </div>
        
        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="{{ url_for('main.index') }}" class="text-gray-400 hover:text-primary-500 transition-colors">
                <i class="bi bi-arrow-left mr-2"></i>Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
