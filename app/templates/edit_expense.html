{% extends "base.html" %}

{% block title %}Edit Expense{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/edit_expense.css') }}">

<div class="expense-container">
    <div class="expense-card">
        <div class="expense-header">
            <div class="expense-icon">✏️</div>
            <h1>Edit Expense</h1>
            <p>Update your expense details</p>
        </div>

        <div class="alert alert-info">
            <i class="bi bi-info-circle"></i> You're editing an existing expense. Make changes and save!
        </div>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <!-- Amount Field -->
            <div class="form-group">
                <label class="form-label"><i class="bi bi-cash-coin"></i> Amount</label>
                <input type="number" step="0.01" name="amount" class="form-control" 
                       value="{{ expense.amount }}" placeholder="Enter amount" required>
            </div>

            <!-- Category Field -->
            <div class="form-group">
                <label class="form-label"><i class="bi bi-tag"></i> Category</label>
                <select name="category" class="form-select" required>
                    <option value="">Select category</option>
                    <option value="Food" {% if expense.category == 'Food' %}selected{% endif %}>🍕 Food</option>
                    <option value="Transport" {% if expense.category == 'Transport' %}selected{% endif %}>🚗 Transport</option>
                    <option value="Entertainment" {% if expense.category == 'Entertainment' %}selected{% endif %}>🎬 Entertainment</option>
                    <option value="Shopping" {% if expense.category == 'Shopping' %}selected{% endif %}>🛍️ Shopping</option>
                    <option value="Bills" {% if expense.category == 'Bills' %}selected{% endif %}>📄 Bills</option>
                    <option value="Health" {% if expense.category == 'Health' %}selected{% endif %}>⚕️ Health</option>
                    <option value="Education" {% if expense.category == 'Education' %}selected{% endif %}>📚 Education</option>
                    <option value="Other" {% if expense.category == 'Other' %}selected{% endif %}>📦 Other</option>
                </select>
            </div>

            <!-- Description Field -->
            <div class="form-group">
                <label class="form-label"><i class="bi bi-chat-left-text"></i> Description</label>
                <textarea name="description" class="form-control" 
                          placeholder="Add details about this expense (Optional)">{{ expense.description or '' }}</textarea>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="submit" class="btn-submit">
                    <i class="bi bi-check-circle"></i>
                    Save Changes
                </button>
                <a href="{{ url_for('main.dashboard') }}" class="btn-cancel">
                    <i class="bi bi-x-circle"></i>
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
